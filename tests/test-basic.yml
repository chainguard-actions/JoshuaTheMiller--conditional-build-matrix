name: Test basic usage with filter
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Copy fixture matrix file to expected location
        run: |
          mkdir -p .github/workflows
          cp $GITHUB_WORKSPACE/actions/hardened/JoshuaTheMiller--conditional-build-matrix/v2.0.1/tests/fixtures/matrix_includes.json \
             .github/workflows/matrix_includes.json

      - id: action
        uses: .
        with:
          inputFile: '.github/workflows/matrix_includes.json'
          filter: '[?include == `true`]'

      - name: Assert matrix output is set
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected matrix output to be non-empty"
            exit 1
          fi
          echo "PASS: matrix output is set"

      - name: Assert matrix contains linux amd64
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if echo "$ACTUAL" | grep -q '"linux"'; then
            echo "PASS: linux platform found in matrix"
          else
            echo "FAIL: expected linux platform in matrix output"
            exit 1
          fi

      - name: Assert filtered-out entries are excluded
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          # arm64 has include=false so should be filtered out
          if echo "$ACTUAL" | python3 -c "
import sys, json
data = json.load(sys.stdin)
# data may be wrapped in {include: [...]} or just a list
items = data.get('include', data) if isinstance(data, dict) else data
for item in items:
    if item.get('arch') == 'arm64':
        print('FAIL: arm64 should have been filtered out')
        sys.exit(1)
print('PASS: arm64 correctly excluded')
"; then
            echo "Assertion passed"
          else
            exit 1
          fi
