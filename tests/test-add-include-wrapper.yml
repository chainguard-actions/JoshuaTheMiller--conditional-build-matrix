name: Test addInclude wrapper output
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Copy fixture matrix file to expected location
        run: |
          mkdir -p .github/workflows
          cp $GITHUB_WORKSPACE/actions/hardened/JoshuaTheMiller--conditional-build-matrix/v2.0.0/tests/fixtures/matrix_includes.json \
             .github/workflows/matrix_includes.json

      - id: action
        uses: .
        with:
          inputFile: '.github/workflows/matrix_includes.json'
          filter: '[?env==`staging`]'
          addInclude: 'true'

      - name: Assert matrix output contains include wrapper
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: matrix output was empty"
            exit 1
          fi
          if echo "$ACTUAL" | grep -q "include"; then
            echo "PASS: include wrapper found in output"
          else
            echo "FAIL: include wrapper not found in output"
            exit 1
          fi

      - name: Assert matrix output contains windows-latest (staging env)
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if echo "$ACTUAL" | grep -q "windows-latest"; then
            echo "PASS: windows-latest found in output"
          else
            echo "FAIL: windows-latest not found in output"
            exit 1
          fi
