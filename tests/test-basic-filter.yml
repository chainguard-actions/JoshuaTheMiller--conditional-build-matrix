name: Test basic filter usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Copy fixture matrix file to expected location
        run: |
          mkdir -p .github/workflows
          cp $GITHUB_WORKSPACE/actions/hardened/JoshuaTheMiller--conditional-build-matrix/v2.0.0/tests/fixtures/matrix_includes.json \
             .github/workflows/matrix_includes.json

      - id: action
        uses: .
        with:
          inputFile: '.github/workflows/matrix_includes.json'
          filter: '[?env==`production`]'

      - name: Assert matrix output is not empty
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: matrix output was empty"
            exit 1
          fi
          echo "PASS: matrix output is non-empty"

      - name: Assert matrix output contains ubuntu-latest
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if echo "$ACTUAL" | grep -q "ubuntu-latest"; then
            echo "PASS: ubuntu-latest found in output"
          else
            echo "FAIL: ubuntu-latest not found in output"
            exit 1
          fi

      - name: Assert matrix output does not contain windows-latest (staging env filtered out)
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if echo "$ACTUAL" | grep -q "windows-latest"; then
            echo "FAIL: windows-latest should have been filtered out"
            exit 1
          fi
          echo "PASS: windows-latest correctly filtered out"
