name: Test filter without include wrap
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Copy fixture matrix file to expected location
        run: |
          mkdir -p .github/workflows
          cp $GITHUB_WORKSPACE/actions/hardened/JoshuaTheMiller--conditional-build-matrix/v1.0.0/tests/fixtures/matrix_includes.json \
             .github/workflows/matrix_includes.json

      - id: action
        uses: .
        with:
          inputFile: '.github/workflows/matrix_includes.json'
          filter: "[?os=='ubuntu-latest']"
          addInclude: 'false'

      - name: Assert matrix output is non-empty
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: matrix output was empty"
            exit 1
          fi
          echo "PASS: matrix output is non-empty"

      - name: Assert matrix output contains ubuntu-latest entries
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if echo "$ACTUAL" | grep -q "ubuntu-latest"; then
            echo "PASS: matrix output contains ubuntu-latest"
          else
            echo "FAIL: expected matrix output to contain 'ubuntu-latest'"
            exit 1
          fi

      - name: Assert matrix output does not contain windows-latest
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if echo "$ACTUAL" | grep -q "windows-latest"; then
            echo "FAIL: matrix output should not contain 'windows-latest' when filtering for ubuntu-latest only"
            exit 1
          fi
          echo "PASS: matrix output correctly excludes windows-latest"

      - name: Assert output is not wrapped in include object when addInclude is false
        env:
          ACTUAL: ${{ steps.action.outputs.matrix }}
        run: |
          echo "actual: $ACTUAL"
          if echo "$ACTUAL" | grep -q '"include"'; then
            echo "FAIL: output should not be wrapped in include object when addInclude=false"
            exit 1
          fi
          echo "PASS: output is not wrapped in include object"
